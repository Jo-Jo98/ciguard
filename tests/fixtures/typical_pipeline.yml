# typical_pipeline.yml
# A realistic real-world pipeline — some good practices, some gaps.
# Represents what you'd find at a mid-size SaaS company.
# Expect: ~5-8 findings (mixed severity).

image: python:3.11

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  DOCKER_REGISTRY: "registry.example.com"
  APP_NAME: "web-service"

stages:
  - install
  - test
  - build
  - deploy-dev
  - deploy-staging
  - deploy-prod

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .pip-cache/
    - node_modules/

# ----------------------------------
# INSTALL
# ----------------------------------
install-deps:
  stage: install
  script:
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt

# ----------------------------------
# TEST
# ----------------------------------
unit-tests:
  stage: test
  script:
    - pytest tests/unit/ -v --cov=app --cov-report=xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    paths:
      - coverage.xml
      - htmlcov/
    expire_in: 1 week
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

lint:
  stage: test
  script:
    - flake8 app/ tests/
    - black --check app/ tests/
    - mypy app/

security-check:
  stage: test
  script:
    - pip install bandit safety
    - bandit -r app/ -ll
    - safety check

# ----------------------------------
# BUILD
# ----------------------------------
build-docker:
  stage: build
  image: docker:24.0.5   # PIPE-001: not pinned to digest but has version
  services:
    - docker:24.0.5-dind  # RUN-002: dind
  script:
    - docker build
        --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        --build-arg VCS_REF=$CI_COMMIT_SHA
        -t $DOCKER_REGISTRY/$APP_NAME:$CI_COMMIT_SHA
        -t $DOCKER_REGISTRY/$APP_NAME:$CI_COMMIT_REF_SLUG
        .
    - docker push $DOCKER_REGISTRY/$APP_NAME:$CI_COMMIT_SHA
    - docker push $DOCKER_REGISTRY/$APP_NAME:$CI_COMMIT_REF_SLUG
    - sha256sum dist/* > dist/checksums.sha256   # Good: integrity check
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^release\//'

# ----------------------------------
# DEPLOY DEV (automatic)
# ----------------------------------
deploy-dev:
  stage: deploy-dev
  image: bitnami/kubectl:1.29
  script:
    - kubectl set image deployment/$APP_NAME app=$DOCKER_REGISTRY/$APP_NAME:$CI_COMMIT_SHA -n dev
  environment:
    name: dev
    url: https://dev.example.com
    deployment_tier: development
  rules:
    - if: '$CI_COMMIT_BRANCH != "main"'

# ----------------------------------
# DEPLOY STAGING (automatic on main)
# ----------------------------------
deploy-staging:
  stage: deploy-staging
  image: bitnami/kubectl:1.29
  script:
    - kubectl set image deployment/$APP_NAME app=$DOCKER_REGISTRY/$APP_NAME:$CI_COMMIT_SHA -n staging
    - kubectl rollout status deployment/$APP_NAME -n staging
  environment:
    name: staging
    url: https://staging.example.com
    deployment_tier: staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ----------------------------------
# DEPLOY PROD (manual on tags)
# Note: has manual gate — this is correct practice
# ----------------------------------
deploy-prod:
  stage: deploy-prod
  image: bitnami/kubectl:1.29
  script:
    - kubectl set image deployment/$APP_NAME app=$DOCKER_REGISTRY/$APP_NAME:$CI_COMMIT_SHA -n production
    - kubectl rollout status deployment/$APP_NAME -n production --timeout=10m
  environment:
    name: production
    url: https://app.example.com
    deployment_tier: production
  when: manual
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+/'
