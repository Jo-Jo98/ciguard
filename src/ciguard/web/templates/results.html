<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ciguard — Scan Results</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #1c2128;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --accent:   #58a6ff;
      --critical: #f85149;
      --high:     #e3b341;
      --medium:   #58a6ff;
      --low:      #3fb950;
      --info:     #8b949e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .topbar-logo { font-size: 1.4rem; }
    .topbar-title { font-weight: 700; font-size: 1.1rem; }
    .topbar-pipe  { font-size: 1rem; color: var(--muted); }
    .topbar-actions { margin-left: auto; display: flex; gap: 8px; }

    .main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

    .grid-top {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 700px) { .grid-top { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Risk Gauge ── */
    .gauge-wrap { display: flex; flex-direction: column; align-items: center; }
    .gauge-svg { width: 160px; height: 90px; overflow: visible; }
    .gauge-bg   { fill: none; stroke: var(--border); stroke-width: 14; stroke-linecap: round; }
    .gauge-arc  { fill: none; stroke-width: 14; stroke-linecap: round;
                  transform-origin: 80px 80px; transition: stroke-dasharray .6s ease; }
    .gauge-score { text-anchor: middle; font-size: 2rem; font-weight: 700; fill: var(--text); }
    .gauge-label { text-anchor: middle; font-size: 0.7rem; fill: var(--muted); }
    .gauge-grade { display: inline-block; font-size: 2.2rem; font-weight: 800; margin-top: 6px; }
    .grade-A { color: var(--low); }
    .grade-B { color: #4fc080; }
    .grade-C { color: var(--high); }
    .grade-D { color: #d07010; }
    .grade-F { color: var(--critical); }

    /* ── Category Bars ── */
    .cat-row { margin-bottom: 11px; }
    .cat-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .cat-name  { font-size: 0.83rem; }
    .cat-score { font-size: 0.78rem; color: var(--muted); }
    .bar-track {
      height: 7px; border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }

    /* ── Severity badge ── */
    .badge {
      display: inline-block;
      padding: 2px 8px; border-radius: 4px; font-size: 0.73rem; font-weight: 600;
    }
    .badge-Critical { background: rgba(248,81,73,.15); color: var(--critical); }
    .badge-High     { background: rgba(227,179,65,.15); color: var(--high); }
    .badge-Medium   { background: rgba(88,166,255,.15); color: var(--medium); }
    .badge-Low      { background: rgba(63,185,80,.15);  color: var(--low); }
    .badge-Info     { background: rgba(139,148,158,.15);color: var(--info); }

    /* ── Severity summary pills ── */
    .sev-pills { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .sev-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      font-size: 0.85rem; cursor: pointer;
      transition: border-color .15s;
    }
    .sev-pill.active-filter { border-color: var(--accent); background: rgba(88,166,255,.08); }
    .sev-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-Critical { background: var(--critical); }
    .dot-High     { background: var(--high); }
    .dot-Medium   { background: var(--medium); }
    .dot-Low      { background: var(--low); }
    .dot-Info     { background: var(--info); }
    .sev-count { font-weight: 700; }

    /* ── Pipeline stage visualizer ── */
    .stage-flow {
      display: flex; align-items: center; gap: 0;
      overflow-x: auto; padding: 4px 0 12px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .stage-box {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      min-width: 110px; text-align: center;
      position: relative;
    }
    .stage-box.has-critical { border-color: var(--critical); }
    .stage-box.has-high     { border-color: var(--high); }
    .stage-box.has-medium   { border-color: var(--medium); }
    .stage-name { font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; word-break: break-all; }
    .stage-jobs { font-size: 0.72rem; color: var(--muted); }
    .stage-dots { display: flex; justify-content: center; gap: 3px; margin-top: 6px; min-height: 8px; }
    .stage-connector {
      flex-shrink: 0;
      width: 20px; text-align: center;
      color: var(--muted); font-size: 0.9rem; user-select: none;
    }

    /* ── Findings table ── */
    .findings-table { width: 100%; border-collapse: collapse; }
    .findings-table th {
      text-align: left; padding: 9px 12px;
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .findings-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .findings-table tr:last-child td { border-bottom: none; }
    .findings-table tr:hover td { background: var(--surface2); }
    .findings-table tr.hidden { display: none; }

    .rule-id { font-family: monospace; font-size: 0.8rem; color: var(--muted); }
    .finding-name { font-size: 0.9rem; font-weight: 500; }
    .finding-loc { font-size: 0.78rem; color: var(--muted); font-family: monospace; }

    /* ── Expandable row ── */
    .expander { cursor: pointer; user-select: none; }
    .expander-icon { color: var(--muted); font-size: 0.75rem; transition: transform .2s; }
    .expander-icon.open { transform: rotate(90deg); }
    .detail-row td {
      padding: 0 12px;
      background: var(--surface2);
      font-size: 0.84rem;
      line-height: 1.6;
    }
    .detail-row.hidden { display: none; }
    .detail-inner { padding: 12px 0 16px; border-bottom: 1px solid var(--border); }
    .detail-section { margin-bottom: 10px; }
    .detail-section:last-child { margin-bottom: 0; }
    .detail-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 4px; }
    .detail-text  { color: var(--text); }
    code { font-family: "SF Mono", Consolas, monospace; background: var(--bg); padding: 1px 5px; border-radius: 3px; font-size: 0.82rem; }
    .compliance-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .chip {
      font-size: 0.72rem; padding: 2px 7px; border-radius: 3px;
      background: rgba(88,166,255,.1); color: var(--accent);
      font-family: monospace;
    }

    /* ── LLM Insights ── */
    .llm-card { border-color: rgba(88,166,255,.4); }
    .llm-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .llm-badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;
      background: rgba(88,166,255,.15); color: var(--accent); font-weight: 600;
    }
    .llm-model { font-size: 0.75rem; color: var(--muted); }
    .llm-section { margin-bottom: 16px; }
    .llm-section:last-child { margin-bottom: 0; }
    .llm-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 6px; }
    .llm-text { font-size: 0.88rem; line-height: 1.65; color: var(--text); }
    .llm-actions { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .llm-actions li { display: flex; gap: 8px; font-size: 0.88rem; }
    .llm-actions li::before { content: "▸"; color: var(--accent); flex-shrink: 0; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text); cursor: pointer;
      font-size: 0.83rem; font-family: inherit;
      text-decoration: none;
      transition: border-color .15s, background .15s;
    }
    .btn:hover { border-color: var(--accent); background: rgba(88,166,255,.08); }

    /* ── Skeleton / loading ── */
    .skeleton {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; min-height: 300px; color: var(--muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-banner {
      padding: 14px 18px;
      background: rgba(248,81,73,.1);
      border: 1px solid rgba(248,81,73,.3);
      border-radius: 8px;
      color: #f85149;
      font-size: 0.9rem;
    }

    .section-gap { margin-bottom: 20px; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">🛡️</span>
  <span class="topbar-title">ciguard</span>
  <span class="topbar-pipe" id="pipelineName">—</span>
  <div class="topbar-actions">
    <a class="btn" href="/" id="newScanBtn">↑ New Scan</a>
    <a class="btn" id="htmlReportBtn" href="#" target="_blank">⬇ HTML Report</a>
    <a class="btn" id="jsonReportBtn" href="#" target="_blank">⬇ JSON</a>
  </div>
</div>

<div class="main" id="main">
  <div class="skeleton" id="loading">
    <div class="spinner"></div>
    <span>Loading scan results…</span>
  </div>
  <div id="content" style="display:none"></div>
</div>

<script>
// ── inject scan_id from server ────────────────────────────────────────────
const SCAN_ID = {{ scan_id | tojson }};

// ── colour helpers ────────────────────────────────────────────────────────
const SEV_COLOURS = {
  Critical: 'var(--critical)', High: 'var(--high)',
  Medium: 'var(--medium)', Low: 'var(--low)', Info: 'var(--info)'
};
const GRADE_CLASS = { A:'grade-A', B:'grade-B', C:'grade-C', D:'grade-D', F:'grade-F' };
const BAR_COLOUR  = s => s >= 75 ? 'var(--low)' : s >= 50 ? 'var(--high)' : 'var(--critical)';

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── gauge arc path ────────────────────────────────────────────────────────
// Half-circle gauge: centre (80,80), radius 60, arc from 180° to 0°
function gaugeArc(pct) {
  const r = 60, cx = 80, cy = 80;
  const circ = Math.PI * r; // half-circle circumference
  const dash  = (pct / 100) * circ;
  return `${dash} ${circ}`;
}

// ── pipeline stage vis ────────────────────────────────────────────────────
function buildStageVis(pipeline, findings) {
  const stages = pipeline.stages || [];
  const jobsByStage = {};
  for (const job of (pipeline.jobs || [])) {
    const s = job.stage || 'test';
    (jobsByStage[s] = jobsByStage[s] || []).push(job);
  }
  // severity per stage (from findings)
  const stageSev = {};
  for (const f of findings) {
    const job = (pipeline.jobs || []).find(j => j.name === f.location);
    if (!job) continue;
    const s = job.stage || 'test';
    const cur = stageSev[s];
    const sevOrder = ['Critical','High','Medium','Low','Info'];
    if (!cur || sevOrder.indexOf(f.severity) < sevOrder.indexOf(cur)) {
      stageSev[s] = f.severity;
    }
  }

  if (!stages.length) return '<p style="color:var(--muted);font-size:.85rem">No stages declared.</p>';

  let html = '<div class="stage-flow">';
  stages.forEach((stage, i) => {
    const jobs = jobsByStage[stage] || [];
    const sev  = stageSev[stage];
    const sevClass = sev ? `has-${sev}` : '';
    const dots = sev
      ? `<span class="dot dot-${esc(sev)}" style="width:8px;height:8px;border-radius:50%;background:${SEV_COLOURS[sev] || 'var(--muted)'}"></span>`
      : '';
    html += `
      <div class="stage-box ${sevClass}" title="${esc(stage)}: ${jobs.length} job(s)${sev ? ', worst: '+sev : ''}">
        <div class="stage-name">${esc(stage)}</div>
        <div class="stage-jobs">${jobs.length} job${jobs.length !== 1 ? 's' : ''}</div>
        <div class="stage-dots">${dots}</div>
      </div>`;
    if (i < stages.length - 1) html += `<div class="stage-connector">→</div>`;
  });
  html += '</div>';
  return html;
}

// ── findings table ────────────────────────────────────────────────────────
let activeFilter = null;

function buildFindingsTable(findings) {
  const sevOrder = ['Critical','High','Medium','Low','Info'];
  const sorted   = [...findings].sort((a,b) =>
    sevOrder.indexOf(a.severity) - sevOrder.indexOf(b.severity)
  );

  let rows = '';
  sorted.forEach((f, i) => {
    const chips = (c => `
      ${(c.iso_27001||[]).map(x=>`<span class="chip">ISO ${esc(x)}</span>`).join('')}
      ${(c.soc2||[]).map(x=>`<span class="chip">SOC2 ${esc(x)}</span>`).join('')}
      ${(c.nist||[]).map(x=>`<span class="chip">NIST ${esc(x)}</span>`).join('')}
    `)(f.compliance || {});

    rows += `
      <tr class="finding-row expander" data-sev="${esc(f.severity)}" onclick="toggleDetail(${i})">
        <td><span class="badge badge-${esc(f.severity)}">${esc(f.severity)}</span></td>
        <td><span class="rule-id">${esc(f.rule_id)}</span></td>
        <td>
          <div class="finding-name">${esc(f.name)}</div>
          <div class="finding-loc">${esc(f.location)}</div>
        </td>
        <td style="text-align:right"><span class="expander-icon" id="icon-${i}">▶</span></td>
      </tr>
      <tr class="detail-row hidden" id="detail-${i}">
        <td colspan="4">
          <div class="detail-inner">
            <div class="detail-section">
              <div class="detail-label">Description</div>
              <div class="detail-text">${esc(f.description)}</div>
            </div>
            <div class="detail-section">
              <div class="detail-label">Evidence</div>
              <div class="detail-text"><code>${esc(f.evidence)}</code></div>
            </div>
            <div class="detail-section">
              <div class="detail-label">Remediation</div>
              <div class="detail-text">${esc(f.remediation).replace(/\n/g,'<br>')}</div>
            </div>
            <div class="detail-section">
              <div class="detail-label">Compliance</div>
              <div class="compliance-chips">${chips}</div>
            </div>
          </div>
        </td>
      </tr>`;
  });

  return `
    <table class="findings-table">
      <thead>
        <tr>
          <th style="width:90px">Severity</th>
          <th style="width:95px">Rule</th>
          <th>Finding / Location</th>
          <th style="width:30px"></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function toggleDetail(i) {
  const row  = document.getElementById(`detail-${i}`);
  const icon = document.getElementById(`icon-${i}`);
  const open = !row.classList.contains('hidden');
  row.classList.toggle('hidden', open);
  icon.classList.toggle('open', !open);
}

function applyFilter(sev) {
  activeFilter = activeFilter === sev ? null : sev;
  document.querySelectorAll('.sev-pill').forEach(p => {
    p.classList.toggle('active-filter', p.dataset.sev === activeFilter);
  });
  document.querySelectorAll('.finding-row').forEach(tr => {
    tr.classList.toggle('hidden', activeFilter && tr.dataset.sev !== activeFilter);
    const i = tr.querySelector('.expander-icon')?.id.replace('icon-','');
    if (i) document.getElementById(`detail-${i}`)?.classList.add('hidden');
  });
}

// ── LLM insights block ────────────────────────────────────────────────────
function buildLLMCard(ins) {
  const actions = (ins.developer_actions || [])
    .map(a => `<li>${esc(a)}</li>`).join('');
  return `
    <div class="card llm-card section-gap">
      <div class="llm-header">
        <span class="card-title" style="margin-bottom:0">AI Insights</span>
        <span class="llm-badge">✨ ${esc(ins.provider)}</span>
        <span class="llm-model">${esc(ins.model_used)}</span>
      </div>
      <div class="llm-section">
        <div class="llm-label">Executive Summary</div>
        <div class="llm-text">${esc(ins.executive_summary)}</div>
      </div>
      <div class="llm-section">
        <div class="llm-label">Developer Action Plan</div>
        <ul class="llm-actions">${actions}</ul>
      </div>
      <div class="llm-section">
        <div class="llm-label">Compliance Impact</div>
        <div class="llm-text">${esc(ins.compliance_impact)}</div>
      </div>
      <div class="llm-section">
        <div class="llm-label">Risk Narrative</div>
        <div class="llm-text">${esc(ins.risk_narrative)}</div>
      </div>
    </div>`;
}

// ── category scores ───────────────────────────────────────────────────────
const CAT_LABELS = [
  ['pipeline_integrity',    'Pipeline Integrity'],
  ['identity_access',       'Identity & Access'],
  ['runner_security',       'Runner Security'],
  ['artifact_handling',     'Artifact Handling'],
  ['deployment_governance', 'Deployment Governance'],
  ['supply_chain',          'Supply Chain'],
];

function buildCatBars(score) {
  return CAT_LABELS.map(([key, label]) => {
    const val = Math.round(score[key] || 0);
    return `
      <div class="cat-row">
        <div class="cat-header">
          <span class="cat-name">${label}</span>
          <span class="cat-score">${val}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${val}%;background:${BAR_COLOUR(val)}"></div>
        </div>
      </div>`;
  }).join('');
}

// ── severity pills ────────────────────────────────────────────────────────
function buildSevPills(bySev) {
  const order = ['Critical','High','Medium','Low','Info'];
  return order
    .filter(s => bySev[s] > 0)
    .map(s => `
      <div class="sev-pill" data-sev="${s}" onclick="applyFilter('${s}')" title="Filter by ${s}">
        <span class="dot dot-${s}"></span>
        <span class="sev-count">${bySev[s]}</span>
        <span style="color:var(--muted);font-size:.8rem">${s}</span>
      </div>`
    ).join('');
}

// ── main render ───────────────────────────────────────────────────────────
async function load() {
  const res = await fetch(`/api/report/${SCAN_ID}`);
  if (!res.ok) {
    document.getElementById('loading').innerHTML =
      `<div class="error-banner">Report not found or server was restarted. <a href="/">Run a new scan</a>.</div>`;
    return;
  }
  const r = await res.json();

  // topbar
  document.getElementById('pipelineName').textContent = r.pipeline_name || '';
  document.title = `ciguard — ${r.pipeline_name}`;
  document.getElementById('htmlReportBtn').href = `/api/report/${SCAN_ID}/html`;
  document.getElementById('jsonReportBtn').href  = `/api/report/${SCAN_ID}`;

  const score  = r.risk_score || {};
  const bySev  = (r.summary || {}).by_severity || {};
  const total  = (r.summary || {}).total || 0;
  const findings = r.findings || [];

  // ── Gauge arc colour ──
  const gaugeColor = score.overall >= 75 ? 'var(--low)'
                   : score.overall >= 50 ? 'var(--high)'
                   : 'var(--critical)';

  const catBars   = buildCatBars(score);
  const sevPills  = buildSevPills(bySev);
  const stageVis  = buildStageVis(r.pipeline || {}, findings);
  const findingsT = findings.length ? buildFindingsTable(findings)
                  : '<p style="color:var(--muted);padding:20px 0">No findings — pipeline looks clean.</p>';
  const llmBlock  = r.llm_insights ? buildLLMCard(r.llm_insights) : '';
  const ts        = r.scan_timestamp ? new Date(r.scan_timestamp).toLocaleString() : '';

  document.getElementById('content').innerHTML = `
    <!-- top grid: gauge + category bars -->
    <div class="grid-top section-gap">
      <div class="card gauge-wrap">
        <div class="card-title">Risk Score</div>
        <svg class="gauge-svg" viewBox="0 0 160 95">
          <!-- background arc (half circle) -->
          <path d="M 20 80 A 60 60 0 0 1 140 80"
                fill="none" stroke="var(--border)" stroke-width="14" stroke-linecap="round"/>
          <!-- filled arc -->
          <path id="gaugeArc"
                d="M 20 80 A 60 60 0 0 1 140 80"
                fill="none" stroke="${gaugeColor}" stroke-width="14" stroke-linecap="round"
                stroke-dasharray="${gaugeArc(score.overall || 0)}"
                pathLength="${Math.PI * 60}"/>
          <text x="80" y="76" class="gauge-score">${Math.round(score.overall || 0)}</text>
          <text x="80" y="91" class="gauge-label">out of 100</text>
        </svg>
        <div class="gauge-grade ${GRADE_CLASS[score.grade] || ''}">${score.grade || '?'}</div>
        <div style="font-size:.78rem;color:var(--muted);margin-top:4px">${total} finding${total !== 1?'s':''}</div>
        ${ts ? `<div style="font-size:.72rem;color:var(--muted);margin-top:4px">${ts}</div>` : ''}
      </div>
      <div class="card">
        <div class="card-title">Category Scores</div>
        ${catBars}
      </div>
    </div>

    <!-- pipeline visualizer -->
    <div class="card section-gap">
      <div class="card-title">Pipeline Stages</div>
      ${stageVis}
    </div>

    <!-- LLM insights (if available) -->
    ${llmBlock}

    <!-- findings -->
    <div class="card">
      <div class="card-title">Findings</div>
      <div class="sev-pills">${sevPills}</div>
      ${findingsT}
    </div>
  `;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

load().catch(err => {
  document.getElementById('loading').innerHTML =
    `<div class="error-banner">Failed to load results: ${esc(err.message)}. <a href="/">Try again</a>.</div>`;
});
</script>
</body>
</html>
