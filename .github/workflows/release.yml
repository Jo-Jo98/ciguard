name: Release

# Release is gated on the same checks CI runs (lint, test matrix, bandit,
# pip-audit, fixture validator) via the reusable `_checks.yml` workflow.
# v0.6.0 and v0.6.1 both shipped despite a red CI on the tagged commit
# because Release had no `needs:` link to CI; the `checks` job below closes
# that gap by re-running every check inline before any publish step fires.
# Adds ~3 minutes per release; releases are rare; the gate is worth it.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml

  pypi:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    needs: checks
    environment: pypi
    permissions:
      id-token: write  # for trusted publishing (PyPI OIDC) + PEP 740 attestations
      contents: write  # for upload-artifact / SBOM attach
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: { python-version: "3.12" }
      - name: Install build deps
        run: pip install --upgrade pip build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
      - name: Generate Python-package CycloneDX SBOM (v0.9.2, issue #14)
        # Direct cyclonedx-bom invocation (modern CLI). The `CycloneDX/
        # gh-python-generate-sbom` action shipped with an older cyclonedx-py
        # that still calls `pkg_resources` from setuptools — Python 3.12+
        # GHA runners ship without setuptools by default, so the action
        # blew up at v0.9.3 with `ModuleNotFoundError: No module named
        # 'pkg_resources'`. Direct call cuts out the action and uses the
        # `requirements` subcommand of the modern CLI. Written to `sbom/`
        # (NOT `dist/`) — anything in `dist/` gets uploaded by
        # gh-action-pypi-publish as a release distribution.
        run: |
          mkdir -p sbom
          pip install --upgrade cyclonedx-bom
          # cyclonedx-bom 7.x flags: `--of <format>` (NOT --output-format),
          # `-o <file>` (NOT --outfile). The misleading naming bit v0.9.3's
          # second attempt — confirmed against `cyclonedx-py requirements --help`.
          cyclonedx-py requirements requirements.txt \
            --of JSON \
            -o sbom/ciguard-${{ github.ref_name }}-python.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (Node 24)
        with:
          name: sbom-python-cyclonedx
          path: sbom/*.cdx.json
          retention-days: 90
      - name: Publish to PyPI (trusted publishing + PEP 740 attestations)
        # PEP 740 attestations have been default-on in this action since v1.10
        # whenever `id-token: write` is granted — every uploaded distribution
        # gets a signed Sigstore bundle visible at https://pypi.org/project/ciguard/#files.
        # Pin tracks `release/v1` branch HEAD: pypa only builds the
        # `ghcr.io/pypa/gh-action-pypi-publish:<sha>` Docker image for that
        # branch, so SHA-pinning to a version tag like v1.14.0 fails with
        # `manifest unknown` on `docker pull` — the v0.9.3 second-retry
        # failure mode. Resync with `gh api repos/pypa/gh-action-pypi-publish/
        # git/refs/heads/release/v1` after a major.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1 HEAD as of 2026-04-28

  ghcr:
    name: Build & push container image to GHCR
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.tag.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image refs (GHCR requires lowercase)
        id: tag
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          echo "repo=$REPO_LC" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "extra=,ghcr.io/$REPO_LC:latest" >> $GITHUB_OUTPUT
          else
            echo "tag=manual-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
            echo "extra=" >> $GITHUB_OUTPUT
          fi
          # Canonical primary ref (no `:latest`) used by cosign in the attest job.
          echo "image=ghcr.io/$REPO_LC:${{ github.ref_name }}" >> $GITHUB_OUTPUT
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0 (Node 24) — enables arm64 emulation for multi-arch builds
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: true
          # Build for both common server + Apple Silicon Mac architectures.
          # v0.1.1 shipped amd64 only and broke `docker pull` on M-series Macs
          # ('no matching manifest for linux/arm64'). Multi-arch added 2026-04-25.
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.tag.outputs.repo }}:${{ steps.tag.outputs.tag }}${{ steps.tag.outputs.extra }}
          # `provenance: true` writes a SLSA provenance attestation alongside
          # the image. Combined with cosign keyless signing in the attest job
          # below, this gives downstream verifiers a full "what built this"
          # picture: who (workflow + commit), how (Dockerfile + base image
          # digest), when, and a Sigstore-signed signature on the manifest.
          provenance: true
          sbom: true

  attest:
    name: Sign image + attach SBOMs (Sigstore keyless)
    runs-on: ubuntu-latest
    needs: ghcr
    permissions:
      contents: read
      packages: write   # cosign pushes signature/SBOM as sibling tags on GHCR
      id-token: write   # OIDC for keyless signing — Sigstore Fulcio uses this
                        # to bind a short-lived cert to the workflow's identity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1
      - name: Log in to GHCR (so cosign can push signatures + SBOM attestations)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prep SBOM output directory + pin image by digest
        # syft (anchore/sbom-action) writes to `output-file` but won't
        # create the parent dir — v0.9.2 attest job failed exactly here.
        # Tags are mutable; digests are not. Signing the digest binds the
        # signature to immutable bytes — a re-pushed `:vX.Y.Z` cannot replay
        # an old signature. Build-push-action returned `digest` as output.
        id: ref
        env:
          IMAGE: ${{ needs.ghcr.outputs.image }}
          DIGEST: ${{ needs.ghcr.outputs.digest }}
        run: |
          mkdir -p sbom
          echo "ref=${IMAGE%:*}@${DIGEST}" >> $GITHUB_OUTPUT

      - name: cosign sign image (keyless, OIDC)
        # Keyless = no long-lived signing key. Fulcio issues a short-lived
        # cert bound to the workflow identity (
        # https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/v0.9.2)
        # and the signature + cert end up in Sigstore's public Rekor
        # transparency log. Anyone can verify with `cosign verify ...`.
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign --yes "${{ steps.ref.outputs.ref }}"

      - name: Generate container SBOM (CycloneDX + SPDX) via syft
        # anchore/sbom-action wraps syft, which produces high-fidelity SBOMs
        # by inspecting the actual built layers — packages, versions, licenses.
        # Both formats because consumers vary: CycloneDX is what most SAST
        # tools speak; SPDX is what regulators (US EO 14028, ISO/IEC 5962) ask
        # for. Producing both costs ~10s and avoids future format-conversion.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ steps.ref.outputs.ref }}
          format: cyclonedx-json
          output-file: sbom/ciguard-${{ github.ref_name }}-image.cdx.json
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ steps.ref.outputs.ref }}
          format: spdx-json
          output-file: sbom/ciguard-${{ github.ref_name }}-image.spdx.json

      - name: cosign attest CycloneDX SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes --type cyclonedx \
            --predicate sbom/ciguard-${{ github.ref_name }}-image.cdx.json \
            "${{ steps.ref.outputs.ref }}"

      - name: cosign attest SPDX SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes --type spdxjson \
            --predicate sbom/ciguard-${{ github.ref_name }}-image.spdx.json \
            "${{ steps.ref.outputs.ref }}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (Node 24)
        with:
          name: sbom-image
          path: sbom/*.json
          retention-days: 90

  trivy:
    name: Trivy scan published image
    runs-on: ubuntu-latest
    needs: ghcr
    permissions:
      contents: read
      packages: read
    steps:
      - name: Compute image ref (GHCR requires lowercase)
        id: tag
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          TAG="${{ github.ref_name }}"
          echo "image=ghcr.io/${REPO_LC}:${TAG}" >> $GITHUB_OUTPUT
      # Trivy pulls the image we just published and reports OS-package + Python
      # CVEs at HIGH/CRITICAL. Failing here surfaces a release that ships
      # known-bad packages — Dependabot's docker base-image PRs are how we keep
      # the floor current between releases. `ignore-unfixed: true` skips
      # vulnerabilities with no upstream fix yet (we cannot act on them).
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.tag.outputs.image }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"

  gh-release:
    name: Create GitHub Release page
    runs-on: ubuntu-latest
    # Wait for every artifact-publishing + attestation step before creating
    # the public Release page — users following the README's `cosign verify`
    # recipe land here expecting signatures + SBOMs to already exist.
    needs: [pypi, ghcr, attest, trivy]
    # Sits behind a deployment-protection environment per ciguard's own
    # GHA-DEP-001 rule (the dogfood lane caught the missing block on first
    # push). The `pypi` env upstream already gates the release on its
    # 2-min wait_timer; this env is created with empty protection rules
    # so it adds no latency, but it's the place to wire required_reviewers
    # or a longer wait_timer later if release-page publishing becomes
    # something we want to slow down.
    environment: github-release
    permissions:
      contents: write  # required for `gh release create`
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Extract this version's section from CHANGELOG.md
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo 'body<<EOF_NOTES'
            python3 scripts/extract_changelog_section.py "$VERSION"
            echo 'EOF_NOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "${{ steps.notes.outputs.body }}"
