name: Release

# Release is gated on the same checks CI runs (lint, test matrix, bandit,
# pip-audit, fixture validator) via the reusable `_checks.yml` workflow.
# v0.6.0 and v0.6.1 both shipped despite a red CI on the tagged commit
# because Release had no `needs:` link to CI; the `checks` job below closes
# that gap by re-running every check inline before any publish step fires.
# Adds ~3 minutes per release; releases are rare; the gate is worth it.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml

  pypi:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    needs: checks
    environment: pypi
    permissions:
      id-token: write  # for trusted publishing (PyPI OIDC)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: { python-version: "3.12" }
      - name: Install build deps
        run: pip install --upgrade pip build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
      - name: Publish to PyPI (trusted publishing — no token needed once configured)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  ghcr:
    name: Build & push container image to GHCR
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image refs (GHCR requires lowercase)
        id: tag
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          echo "repo=$REPO_LC" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "extra=,ghcr.io/$REPO_LC:latest" >> $GITHUB_OUTPUT
          else
            echo "tag=manual-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
            echo "extra=" >> $GITHUB_OUTPUT
          fi
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3 — enables arm64 emulation for multi-arch builds
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: true
          # Build for both common server + Apple Silicon Mac architectures.
          # v0.1.1 shipped amd64 only and broke `docker pull` on M-series Macs
          # ('no matching manifest for linux/arm64'). Multi-arch added 2026-04-25.
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.tag.outputs.repo }}:${{ steps.tag.outputs.tag }}${{ steps.tag.outputs.extra }}

  trivy:
    name: Trivy scan published image
    runs-on: ubuntu-latest
    needs: ghcr
    permissions:
      contents: read
      packages: read
    steps:
      - name: Compute image ref (GHCR requires lowercase)
        id: tag
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          TAG="${{ github.ref_name }}"
          echo "image=ghcr.io/${REPO_LC}:${TAG}" >> $GITHUB_OUTPUT
      # Trivy pulls the image we just published and reports OS-package + Python
      # CVEs at HIGH/CRITICAL. Failing here surfaces a release that ships
      # known-bad packages — Dependabot's docker base-image PRs are how we keep
      # the floor current between releases. `ignore-unfixed: true` skips
      # vulnerabilities with no upstream fix yet (we cannot act on them).
      - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          image-ref: ${{ steps.tag.outputs.image }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
