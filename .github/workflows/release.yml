name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  pypi:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # for trusted publishing (PyPI OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install build deps
        run: pip install --upgrade pip build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
      - name: Publish to PyPI (trusted publishing — no token needed once configured)
        uses: pypa/gh-action-pypi-publish@release/v1

  ghcr:
    name: Build & push container image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "extra=,ghcr.io/${{ github.repository }}:latest" >> $GITHUB_OUTPUT
          else
            echo "tag=manual-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
            echo "extra=" >> $GITHUB_OUTPUT
          fi
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}${{ steps.tag.outputs.extra }}
