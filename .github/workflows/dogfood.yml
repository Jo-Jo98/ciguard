name: Dogfood (ciguard scans ciguard)

# Run ciguard against its own .github/workflows/*.yml and upload the SARIF
# to GitHub Code Scanning. Two purposes:
#
#   1. Catch regressions — any change to our own CI hygiene becomes a
#      Code-scanning alert before it lands on main.
#   2. Visible proof we eat our own dog food. The Security tab → Code
#      scanning view shows ciguard alongside CodeQL.
#
# This workflow does NOT gate the build (no `needs:` link from anywhere).
# It exists purely to surface findings in the Security UI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC — same slot as codeql + atheris

permissions:
  contents: read
  security-events: write

jobs:
  ciguard-self-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ciguard from this checkout
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Scan every workflow file, merge into one SARIF run
        # GitHub Code Scanning's July 2025 rule change rejects multiple SARIF
        # runs uploaded under the same category. ciguard emits one run per
        # scan, so we concat the per-file `results[]` arrays into a single
        # run before upload. jq is preinstalled on ubuntu-latest.
        run: |
          mkdir -p sarif
          combined=""
          for f in .github/workflows/*.yml; do
            tmp=$(mktemp).sarif
            # `--offline` keeps SCA HTTP off — air-gap-safe + reproducible.
            # `|| true` because non-zero exit (Critical/High findings) must
            # not block the upload step.
            ciguard scan --input "$f" --format sarif \
              --output "$tmp" --offline || true
            if [ -z "$combined" ]; then
              combined=sarif/ciguard.sarif
              cp "$tmp" "$combined"
            else
              jq --slurpfile extra <(jq '.runs[0].results' "$tmp") \
                '.runs[0].results += $extra[0]' "$combined" > sarif/_merged.sarif
              mv sarif/_merged.sarif "$combined"
            fi
          done
          echo "Combined SARIF result count:"
          jq '.runs[0].results | length' "$combined"

      - uses: github/codeql-action/upload-sarif@b2f9ef845756500b97acbdaf5c1dd4e9c1d15734  # v3.35.2
        with:
          sarif_file: sarif/ciguard.sarif
          category: ciguard-self-scan
