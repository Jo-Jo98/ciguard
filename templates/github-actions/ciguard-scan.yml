# ciguard — minimal scan workflow
#
# Drop this file at .github/workflows/ciguard.yml in your repo for a
# zero-config first run. Scans every recognised pipeline file in the
# repo and uploads the JSON aggregate as a build artifact. Does NOT
# fail the build on findings (informational mode) — graduate to
# `ciguard-scan-baseline.yml` once you want CI gating.
#
# Bump the pinned ciguard version when you want to upgrade.

name: ciguard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ciguard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ciguard (pinned)
        run: pip install --upgrade pip && pip install ciguard==0.10.0

      - name: Scan repository
        run: ciguard scan-repo . --output ciguard-results.json --offline

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
        if: always()
        with:
          name: ciguard-results
          path: ciguard-results.json
